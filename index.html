<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Crash | Игра</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Главный экран (Краш) -->
    <div id="mainScreen" class="screen active">
        <header class="header">
            <div class="user-info" id="userInfo">
                <!-- Сюда вставится аватар и ник из Telegram -->
                <img id="userAvatar" src="" alt="Аватар">
                <span id="userName">Загрузка...</span>
            </div>
            <div class="balance">
                <div class="balance-title">Ваш баланс</div>
                <div class="balance-amount">
                    <span id="balance">0.00</span> <span class="currency">★</span>
                </div>
                <button class="btn-small" onclick="showDeposit()">Пополнить</button>
            </div>
        </header>

        <main class="game-area">
            <div class="rocket-container">
                <div class="rocket" id="rocket">🚀</div>
                <div class="multiplier-display">
                    Множитель: <span id="currentMultiplier">1.00x</span>
                </div>
                <canvas id="crashChart" width="300" height="100"></canvas>
            </div>

            <div class="bet-section">
                <div class="bet-input-group">
                    <input type="number" id="betAmount" min="0.2" step="0.2" value="0.20" placeholder="Сумма ставки">
                    <div class="quick-bets">
                        <button class="btn-chip" onclick="setBet(0.20)">0.20</button>
                        <button class="btn-chip" onclick="setBet(0.50)">0.50</button>
                        <button class="btn-chip" onclick="setBet(1)">1</button>
                        <button class="btn-chip" onclick="setBet(5)">5</button>
                    </div>
                </div>

                <div class="auto-cashout">
                    <label>Авто-вывод:</label>
                    <input type="number" id="autoCashout" min="1.1" step="0.1" value="2.00" placeholder="2.00x">
                </div>

                <button class="btn-bet" id="placeBetBtn" onclick="placeBet()">
                    Сделать ставку — <span id="betAmountDisplay">0.20</span> ★
                </button>

                <div class="active-bet" id="activeBetSection" style="display: none;">
                    <div>Ваша ставка: <span id="activeBetAmount">0</span> ★</div>
                    <button class="btn-cashout" onclick="cashOut()">Забрать x<span id="cashoutMultiplier">1.00</span></button>
                </div>
            </div>

            <div class="history">
                <h3>Последние игры:</h3>
                <ul id="historyList">
                    <!-- История будет здесь -->
                </ul>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="switchScreen('top')">🏆 Топ</button>
            <button class="nav-btn active" onclick="switchScreen('crash')">🚀 Краш</button>
            <button class="nav-btn" onclick="switchScreen('profile')">👤 Профиль</button>
        </nav>
    </div>

    <!-- Экран пополнения -->
    <div id="depositScreen" class="screen">
        <div class="deposit-header">
            <button class="btn-back" onclick="showMain()">← Назад</button>
            <h2>Пополнение баланса</h2>
        </div>
        <div class="deposit-options">
            <div class="deposit-option" onclick="buyStars(10)">
                <div class="stars">10 ★</div>
                <div class="price">≈ 100 ₽</div>
            </div>
            <div class="deposit-option" onclick="buyStars(50)">
                <div class="stars">50 ★</div>
                <div class="price">≈ 500 ₽</div>
            </div>
            <div class="deposit-option" onclick="buyStars(100)">
                <div class="stars">100 ★</div>
                <div class="price">≈ 1000 ₽</div>
            </div>
        </div>
        <p class="note">★ — Telegram Stars. 1 звезда ≈ 10 ₽</p>
    </div>

    <!-- Экран профиля -->
    <div id="profileScreen" class="screen">
        <div class="profile-header">
            <button class="btn-back" onclick="showMain()">← Назад</button>
            <h2>Ваш профиль</h2>
        </div>
        <div class="profile-content">
            <img id="profileAvatar" src="" alt="Аватар" class="profile-avatar">
            <h3 id="profileName"></h3>
            <div class="profile-stats">
                <div class="stat">
                    <div class="stat-label">Всего игр</div>
                    <div class="stat-value" id="totalGames">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Выиграно</div>
                    <div class="stat-value" id="totalWon">0 ★</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
